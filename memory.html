<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🃏 기억력 카드</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --highlight: #56d98a;
      --purple: #a78bfa;
      --red: #e94560;
      --text: #e0e0e0;
      --text-dim: #8899aa;
      --card-back: #0f2040;
      --card-front: #16213e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: rgba(22,33,62,0.95);
      border-bottom: 1px solid rgba(86,217,138,0.15);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .home-btn {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .home-btn:hover { color: var(--highlight); }
    .topbar-title { font-size: 1.1rem; font-weight: 800; color: var(--highlight); letter-spacing: 2px; }
    .topbar-score { font-size: 0.9rem; color: var(--text-dim); }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      gap: 20px;
      width: 100%;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-box {
      background: var(--panel);
      border: 1px solid rgba(86,217,138,0.12);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }
    .stat-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--highlight); }

    /* Difficulty */
    .diff-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .diff-btn {
      background: rgba(86,217,138,0.08);
      border: 1px solid rgba(86,217,138,0.25);
      color: var(--highlight);
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .diff-btn:hover, .diff-btn.active { background: rgba(86,217,138,0.22); }

    /* Card grid */
    .card-grid {
      display: grid;
      gap: 10px;
      max-width: 500px;
      width: 100%;
    }
    .card-grid.g4  { grid-template-columns: repeat(4,1fr); }
    .card-grid.g5  { grid-template-columns: repeat(5,1fr); }
    .card-grid.g6  { grid-template-columns: repeat(6,1fr); }

    /* Card flip */
    .card-scene {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }
    .card-scene.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-back {
      background: var(--card-back);
      border: 2px solid rgba(86,217,138,0.18);
      font-size: 1.4rem;
    }
    .card-front {
      background: var(--card-front);
      border: 2px solid rgba(86,217,138,0.35);
      font-size: 1.8rem;
      transform: rotateY(180deg);
    }
    .card-scene.matched .card-back { border-color: rgba(86,217,138,0.5); }
    .card-scene.matched .card-front {
      background: rgba(86,217,138,0.12);
      border-color: rgba(86,217,138,0.7);
    }
    .card-back::after { content: '?'; color: rgba(86,217,138,0.5); font-size: 1.2rem; font-weight: 900; }

    /* Shake animation for mismatch */
    @keyframes shake {
      0%,100%{transform:rotateY(180deg) translateX(0)}
      25%{transform:rotateY(180deg) translateX(-4px)}
      75%{transform:rotateY(180deg) translateX(4px)}
    }
    .card-scene.shake .card-inner { animation: shake 0.35s ease; }

    /* Overlay */
    .overlay-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,15,40,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay-wrap.show { display: flex; }
    .overlay-box {
      background: var(--panel);
      border: 1px solid rgba(86,217,138,0.25);
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: popIn 0.35s ease;
    }
    @keyframes popIn {
      0%{transform:scale(0.7);opacity:0}
      80%{transform:scale(1.05)}
      100%{transform:scale(1);opacity:1}
    }
    .ov-icon { font-size: 3rem; }
    .ov-title { font-size: 1.8rem; font-weight: 900; color: var(--highlight); }
    .ov-stats { color: var(--text-dim); font-size: 0.95rem; line-height: 1.8; }
    .ov-stats span { color: var(--highlight); font-weight: 700; }
    .restart-btn {
      background: var(--highlight);
      color: #1a1a2e;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .restart-btn:hover { opacity: 0.85; transform: scale(1.04); }

    @media (max-width: 420px) {
      .card-grid { gap: 7px; }
      .card-front { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="home-btn">← 홈으로</a>
  <div class="topbar-title">🃏 MEMORY</div>
  <div style="width:80px"></div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">시도 횟수</div>
      <div class="stat-val" id="tries-el">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">맞춘 쌍</div>
      <div class="stat-val" id="matched-el">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">시간</div>
      <div class="stat-val" id="time-el">0:00</div>
    </div>
  </div>

  <div class="diff-row">
    <button class="diff-btn active" data-size="4">쉬움 4×4</button>
    <button class="diff-btn" data-size="5">보통 4×5</button>
    <button class="diff-btn" data-size="6">어려움 6×6</button>
    <button class="diff-btn" onclick="newGame()">🔄 새 게임</button>
  </div>

  <div class="card-grid g4" id="card-grid"></div>
</div>

<!-- Win overlay -->
<div class="overlay-wrap" id="win-overlay">
  <div class="overlay-box">
    <div class="ov-icon">🎉</div>
    <div class="ov-title">완성!</div>
    <div class="ov-stats" id="win-stats"></div>
    <button class="restart-btn" onclick="newGame()">🔄 다시 플레이</button>
    <button class="restart-btn" style="background:transparent;color:var(--highlight);border:1px solid var(--highlight)" onclick="document.getElementById('win-overlay').classList.remove('show')">닫기</button>
  </div>
</div>

<script>
const EMOJIS = ['🐱','🐶','🦊','🐼','🦁','🐸','🐧','🦄','🐺','🐻','🦋','🐠','🦀','🐙','🌸','🍎','🎸','🚀','⚡','🌈','🍕','🎯','💎','🍦'];

let cols, rows, totalPairs, cards, flipped, matched, tries, timerInterval, startTime, gameActive;
let currentSize = 4;

const gridEl = document.getElementById('card-grid');
const triesEl = document.getElementById('tries-el');
const matchedEl = document.getElementById('matched-el');
const timeEl = document.getElementById('time-el');
const winOverlay = document.getElementById('win-overlay');
const winStats = document.getElementById('win-stats');

function setSize(size) {
  currentSize = size;
  document.querySelectorAll('.diff-btn[data-size]').forEach(b=>{
    b.classList.toggle('active', +b.dataset.size===size);
  });
}

document.querySelectorAll('.diff-btn[data-size]').forEach(btn=>{
  btn.addEventListener('click', ()=>{ setSize(+btn.dataset.size); newGame(); });
});

function newGame() {
  clearInterval(timerInterval);
  winOverlay.classList.remove('show');

  if      (currentSize===4){ cols=4;rows=4; }
  else if (currentSize===5){ cols=4;rows=5; }
  else                      { cols=6;rows=6; }

  totalPairs = (cols*rows)/2;
  const emojis = EMOJIS.slice(0, totalPairs);
  cards = shuffle([...emojis, ...emojis]);
  flipped = []; matched = new Set(); tries = 0; gameActive = true;
  triesEl.textContent = 0;
  matchedEl.textContent = 0;
  timeEl.textContent = '0:00';

  gridEl.className = 'card-grid g' + cols;
  render();

  startTime = Date.now();
  timerInterval = setInterval(()=>{
    const s = Math.floor((Date.now()-startTime)/1000);
    timeEl.textContent = Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');
  }, 500);
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function render() {
  gridEl.innerHTML = '';
  cards.forEach((emoji, i)=>{
    const scene = document.createElement('div');
    scene.className = 'card-scene' + (flipped.includes(i)||matched.has(i)?' flipped':'') + (matched.has(i)?' matched':'');
    scene.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      </div>`;
    scene.addEventListener('click', ()=>flip(i, scene));
    gridEl.appendChild(scene);
  });
}

function getCardEl(i) { return gridEl.children[i]; }

function flip(i, el) {
  if (!gameActive) return;
  if (matched.has(i) || flipped.includes(i)) return;
  if (flipped.length >= 2) return;

  flipped.push(i);
  el.classList.add('flipped');

  if (flipped.length === 2) {
    gameActive = false;
    tries++;
    triesEl.textContent = tries;

    const [a, b] = flipped;
    if (cards[a] === cards[b]) {
      matched.add(a); matched.add(b);
      matchedEl.textContent = matched.size / 2;
      getCardEl(a).classList.add('matched');
      getCardEl(b).classList.add('matched');
      flipped = [];
      gameActive = true;

      if (matched.size === cards.length) {
        clearInterval(timerInterval);
        const s = Math.floor((Date.now()-startTime)/1000);
        const timeStr = Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');
        const rating = tries <= totalPairs ? '⭐⭐⭐ 완벽!' : tries <= totalPairs*1.5 ? '⭐⭐ 훌륭!' : '⭐ 클리어!';
        setTimeout(()=>{
          winStats.innerHTML = `시도 횟수: <span>${tries}번</span><br>클리어 시간: <span>${timeStr}</span><br>평가: <span>${rating}</span>`;
          winOverlay.classList.add('show');
        }, 500);
      }
    } else {
      // Mismatch — shake and flip back
      setTimeout(()=>{
        const ea = getCardEl(a), eb = getCardEl(b);
        ea.classList.add('shake'); eb.classList.add('shake');
        setTimeout(()=>{
          ea.classList.remove('flipped','shake');
          eb.classList.remove('flipped','shake');
          flipped = [];
          gameActive = true;
        }, 400);
      }, 700);
    }
  }
}

// Start default game
newGame();
</script>
</body>
</html>
